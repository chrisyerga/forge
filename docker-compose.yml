services:
  web:
    image: ${WEB_IMAGE:-ghcr.io/chrisyerga/forge:latest}
    container_name: forge-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      # Runtime secrets injected by Porch (`service register --env ...`).
      - CONVEX_URL=${CONVEX_URL}
      - VITE_CONVEX_URL=${VITE_CONVEX_URL}
      - FORGE_SERVER_SECRET=${FORGE_SERVER_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    networks:
      - porch

networks:
  porch:
    external: true
