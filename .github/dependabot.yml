version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      ai-sdk:
        patterns:
          - "@ai-sdk/*"
          - "ai"
      convex:
        patterns:
          - "convex"
          - "convex-*"
          - "@convex-dev/*"
      tanstack:
        patterns:
          - "@tanstack/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
